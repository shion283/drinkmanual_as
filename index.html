<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>ドリンクマニュアル</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>ドリンクマニュアル</h1>


<label>ベース</label>
<select id="baseFilter">
<option value="">すべて</option>
</select>


<label>割り材</label>
<select id="mixerFilter">

<option value="">すべて</option>

<option>ソーダ</option>
<option>コーラ</option>
<option>ジンジャー</option>
<option>トニック</option>
<option>オレンジ</option>
<option>アップル</option>
<option>グレープフルーツ</option>
<option>ウーロン茶</option>
<option>水</option>
<option>お湯</option>
<option>ミルク</option>
<option>ロック</option>
<option>ストレート</option>

</select>


<label>グラス</label>
<select id="glassFilter">

<option value="">すべて</option>

<option value="コリンズ">コリンズ</option>
<option value="8oz">8oz(ハッタン)</option>

</select>


<label>カクテル名検索</label>
<input id="cocktailSearch" placeholder="例：カシス">


<div id="drinkList"></div>


<script src="script.js"></script>

</body>
</html>
